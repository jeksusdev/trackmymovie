name: Security checks

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  security-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check JavaScript syntax
        run: |
          node --check js/core.js
          node --check js/api.js
          node --check js/app.js
          node --check sw.js

      - name: Run unit tests
        run: node --test tests/*.test.js

      - name: Ensure private secrets are not committed
        shell: bash
        run: |
          if grep -RInE \
            --exclude-dir=.git \
            --exclude-dir=vendor \
            --exclude='security-checks.yml' \
            --exclude='SECURITY.md' \
            '(service_role|BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|CLOUDFLARE_API_TOKEN|TMDB_API_KEY[[:space:]]*=[[:space:]]*[^$]|api_key=[A-Za-z0-9]{20,})' \
            .; then
            echo 'Potential private secret detected.'
            exit 1
          fi

      - name: Ensure new commits do not introduce secrets
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            range="${{ github.event.before }}..${{ github.sha }}"
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              range="${{ github.sha }}"
            fi
          fi

          if git grep -n -I -E \
            '(sb_secret_[A-Za-z0-9_-]{16,}|[0-9]{8,10}:[A-Za-z0-9_-]{30,}|BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|CLOUDFLARE_API_TOKEN[[:space:]]*=|SUPABASE_SERVICE_ROLE_KEY[[:space:]]*=[[:space:]]*[^$]|TELEGRAM_BOT_TOKEN[[:space:]]*=[[:space:]]*[^$]|TMDB_API_KEY[[:space:]]*=[[:space:]]*[^$]|const TMDB_KEY[[:space:]]*=[[:space:]]*['"'"'"][A-Za-z0-9]{20,})' \
            $(git rev-list "$range") \
            -- \
            ':(exclude).github/workflows/security-checks.yml' \
            ':(exclude)SECURITY.md'; then
            echo 'A new commit introduced a potential private secret.'
            exit 1
          fi

      - name: Enforce client security invariants
        shell: bash
        run: |
          if grep -RInE --include='*.html' --include='*.js' '(onclick=|onload=|onerror=)' index.html js; then
            echo 'Inline event handler detected.'
            exit 1
          fi
          if grep -RInE --include='*.js' 'api\.themoviedb\.org|const TMDB_KEY|TMDB_BASE[[:space:]]*=[[:space:]]*['"'"'"]\/api\/tmdb' js; then
            echo 'Direct TMDB client access or key detected.'
            exit 1
          fi

      - name: Verify required security files
        shell: bash
        run: |
          test -f _headers
          test -f SECURITY.md
          test -f supabase/security-hardening.sql
          grep -q "Content-Security-Policy:" _headers
          grep -q "frame-ancestors 'none'" _headers
