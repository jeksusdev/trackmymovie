<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackMyMovie — Movie & TV Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  @import url('https://googleapis.com');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24; --surface3: #22222f;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #f0eff8; --text2: #9895b0; --text3: #5c5a72;
    --accent: #7c6af7; --accent2: #a896ff; --accent-bg: rgba(124,106,247,0.12);
    --danger: #f05050; --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    --r: 10px; --r-lg: 16px;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; line-height: 1.6; min-height: 100vh; }

  /* AUTH GATE - ПО УМОЛЧАНИЮ ОТКРЫТ */
  #auth-gate {
    display: flex !important;
    flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem; text-align: center;
  }
  #auth-gate h1 { font-family: var(--font-display); font-size: 40px; font-weight: 700; margin-bottom: 8px; color: #fff; }
  #auth-gate p { color: var(--text2); margin-bottom: 2rem; font-size: 15px; }
  
  .gate-box { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--r-lg); padding: 2rem; width: 100%; max-width: 460px; }
  label { display: block; text-align: left; font-size: 12px; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
  
  input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r);
    color: var(--text); font-family: var(--font-body); font-size: 14px; padding: 10px 14px; outline: none; margin-bottom: 12px;
  }
  input:focus { border-color: var(--accent); }
  
  button.primary-btn {
    width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--r);
    padding: 11px; font-family: var(--font-display); font-size: 15px; font-weight: 600; cursor: pointer;
  }

  /* APP - ПО УМОЛЧАНИЮ СКРЫТО */
  #app { display: none !important; padding: 2rem; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
  .logo { font-family: var(--font-display); font-size: 24px; font-weight: 700; }
  .logo .track { color: #005BBB; }
  .logo .my { color: #FFD500; }
</style>
<!-- Подключаем официальный скрипт базы данных Supabase -->
<script src="https://jsdelivr.net"></script>
</head>
<body>

  <!-- Экран входа (появится сразу) -->
  <div id="auth-gate">
    <h1>TrackMyMovie</h1>
    <p>Movie & TV Tracker</p>
    <div class="gate-box">
      <label>Email</label>
      <input type="email" id="email-input" placeholder="your@email.com">
      <label>Password</label>
      <input type="password" id="password-input" placeholder="••••••••">
      <button class="primary-btn" id="login-btn">Войти</button>
      <button class="primary-btn" id="guest-btn" style="background: transparent; border: 1px solid var(--border2); margin-top: 10px; color: var(--text2);">Войти как гость</button>
    </div>
  </div>

  <!-- Главное приложение (скрыто до авторизации) -->
  <div id="app">
    <header>
      <div class="logo"><span class="track">Track</span><span class="my">My</span>Movie</div>
      <button class="primary-btn" id="logout-btn" style="width: auto; background: var(--danger); padding: 6px 14px;">Выйти</button>
    </header>
    <main>
      <h2>Добро пожаловать в трекер!</h2>
      <p>Здесь будут отображаться ваши фильмы из базы данных.</p>
    </main>
  </div>

  <script>
    // Ждем полной загрузки страницы перед запуском логики
    document.addEventListener("DOMContentLoaded", async () => {
      
      // ПОМЕНЯЙТЕ ЭТИ ДАННЫЕ НА СВОИ ИЗ НАСТРОЕК SUPABASE!
      const SUPABASE_URL = 'https://qpxaiztckfbcktfzsmmb.supabase.co/'; 
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFweGFpenRja2ZiY2t0ZnpzbW1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTg3NDUsImV4cCI6MjA5NjMzNDc0NX0.5kZ-owTKhGaGdawpDfWW0lIFUafsYMOqcNMSwtZk8Wo';

      let supabase = null;

      try {
        // Проверяем, загрузилась ли библиотека базы данных
        if (typeof supabase !== 'undefined' && SUPABASE_URL !== 'https://supabase.co') {
          supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          
          // Проверяем, вошел ли уже пользователь
          const { data: { session } } = await supabase.auth.getSession();
          if (session) {
            showApp();
          }
        }
      } catch (e) {
        console.error("Ошибка подключения к Supabase. Включен режим гостя.", e);
      }

      // Функции переключения экранов
      function showApp() {
        document.getElementById('auth-gate').style.setProperty('display', 'none', 'important');
        document.getElementById('app').style.setProperty('display', 'block', 'important');
      }

      function showAuth() {
        document.getElementById('auth-gate').style.setProperty('display', 'flex', 'important');
        document.getElementById('app').style.setProperty('display', 'none', 'important');
      }

      // Кнопка гостевого режима (позволяет войти без Supabase)
      document.getElementById('guest-btn').addEventListener('click', showApp);
      
      // Кнопка выхода
      document.getElementById('logout-btn').addEventListener('click', async () => {
        if (supabase) await supabase.auth.signOut();
        showAuth();
      });
    });
  </script>
</body>
</html>
