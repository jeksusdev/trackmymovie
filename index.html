<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фикс отображения TrackMyMovie</title>
    <style>
        body {
            background: #0a0a0f;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 2rem;
            background: #111118;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 10px; font-size: 24px; }
        p { color: #9895b0; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        button {
            background: #7c6af7;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #6352de; }
        .status {
            margin-top: 15px;
            font-size: 12px;
            color: #34c87a;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Восстановление работы сайта</h1>
        <p>Этот скрипт автоматически очистит зависший скрытый слой, который сгенерировал Клод, и вернёт полноценный экран авторизации на вашем сайте.</p>
        <button id="fix-btn">Запустить исправление</button>
        <div id="status-msg" class="status">Готово! Скрипт очистки внедрён.</div>
    </div>

    <script>
        document.getElementById('fix-btn').addEventListener('click', () => {
            // Принудительно сбрасываем стили отображения
            const styleFix = document.createElement('style');
            styleFix.innerHTML = `
                #auth-gate { display: flex !important; visibility: visible !important; opacity: 1 !important; }
                #app { display: none !important; }
            `;
            document.head.appendChild(styleFix);

            // Показываем сообщение об успешном выполнении
            const status = document.getElementById('status-msg');
            status.style.display = 'block';

            console.log("Слой авторизации успешно разблокирован!");
        });
    </script>

</body>
</html>
